<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensions</title>

    <style>
        * {
            font-size: 30px;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: white;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        /* Section Headings */
        .section-heading {
            font-size: 36px;
            margin-top: 40px;
            margin-bottom: 20px;
            color: #222;
        }

        .section-divider {
            border: none;
            border-top: 3px solid #ccc;
            margin: 40px 0;
        }

        /* List */
        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background-color: #fff;
            margin: 10px 0;
            padding: 15px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        li:hover {
            background-color: #e0e0e0;
        }

        /* Content */
        #comprehension {
            display: none;
            margin-top: 40px;
        }

        .sentence {
            margin-bottom: 25px;
        }

        /* Toggle arrows */
        .toggle-arrow,
        .toggle-mcq-arrow {
            cursor: pointer;
            color: #3399ff;
            margin-left: 8px;
            font-size: 24px;
        }

        .toggle-arrow:hover,
        .toggle-mcq-arrow:hover {
            color: #ff9933;
        }

        /* Word popup */
        .difficult {
            cursor: pointer;
            background-color: #e9e9e9;
            border-right: 5px solid white;
        }

        .difficult:hover {
            background-color: #A4E1F6;
        }

        .popup {
            display: none;
            position: absolute;
            background: #fcedff;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 6px;
            max-width: 300px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .romaji {
            color: gray;
        }

        .meaning {
            color: green;
        }

        .translation {
            display: none;
            padding: 8px;
            background: #3399ff;
            border-radius: 4px;
            margin-top: 10px;
        }

        .mcq-answer {
            display: none;
            padding: 8px;
            background: #d4edda;
            border-radius: 5px;
            margin-top: 8px;
        }

        .back-footer {
            display: block;
            margin-top: 40px;
            text-align: center;
            cursor: pointer;
            color: #3399ff;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h1>Comprehensions</h1>

    <ul id="comprehension-list"></ul>
    <div id="comprehension"></div>
    <div id="popup" class="popup"></div>

    <script>
        const list = document.getElementById('comprehension-list');
        const comprehension = document.getElementById('comprehension');
        const popup = document.getElementById('popup');

        let comprehensionData = {};
        let activeWord = null;

        let comprehensionList = [
            { name: "d1", text: "Dokkai 1" },
            { name: "test_dokkai", text: "Test" }
        ];

        comprehensionList.forEach(item => {
            list.innerHTML += `<li data-name="${item.name}">${item.text}</li>`;
        });

        async function loadJSON(item) {
            const name = item.getAttribute('data-name');
            const url = `https://raw.githubusercontent.com/BhumikRajput/Flashcards/main/assets/comprehensions/${name}.json`;

            if (!comprehensionData[name]) {
                const response = await fetch(url);
                if (!response.ok) return null;
                const text = await response.text();
                comprehensionData[name] = JSON.parse(text);
            }
            return comprehensionData[name];
        }

        /* ============================= */

        list.addEventListener('click', async (e) => {
            const item = e.target.closest('li');
            if (!item) return;

            let data = await loadJSON(item);
            if (!data) return;

            comprehension.innerHTML = "";
            list.style.display = 'none';

            let html = "";

            if (data[0] && !data[0].type) {
                data = [{ type: "paragraph", data: data }];
            }

            data.forEach(section => {

                /* -------- PARAGRAPH SECTION -------- */
                if (section.type === "paragraph") {

                    html += `<div class="section-heading">📖 Reading Passage</div>`;

                    section.data.forEach(sentenceDict => {

                        let sentenceObj = '';

                        sentenceDict.sentence.forEach(token => {
                            if (token.meaning === null) {
                                sentenceObj += token.morpheme;
                            } else {
                                sentenceObj += `
                            <span class="difficult"
                                data-meaning="${token.meaning}"
                                data-romaji="${token.romaji}">
                                ${token.morpheme}
                            </span>
                        `;
                            }
                        });

                        html += `
                    <div class="sentence" data-meaning="${sentenceDict.translation}">
                        <p>
                            ${sentenceObj}
                            <span class="toggle-arrow">▼</span>
                        </p>
                        <div class="translation"></div>
                    </div>
                `;
                    });

                    html += `<hr class="section-divider">`;
                }

                /* -------- MCQ SECTION -------- */
                if (section.type === "mcq") {

                    html += `<div class="section-heading">📝 Questions</div>`;

                    section.data.forEach((questionObj, index) => {

                        let questionHTML = '';

                        questionObj.question.forEach(token => {
                            if (token.meaning === null) {
                                questionHTML += token.morpheme;
                            } else {
                                questionHTML += `
                            <span class="difficult"
                                data-meaning="${token.meaning}"
                                data-romaji="${token.romaji}">
                                ${token.morpheme}
                            </span>
                        `;
                            }
                        });

                        html += `
                    <div class="sentence">
                        <p>
                            <strong>Q${index + 1}:</strong>
                            ${questionHTML}
                            <span class="toggle-mcq-arrow">▼</span>
                        </p>
                `;

                        questionObj.options.forEach((option, i) => {

                            let optionHTML = '';

                            option.forEach(token => {
                                if (token.meaning === null) {
                                    optionHTML += token.morpheme;
                                } else {
                                    optionHTML += `
                                <span class="difficult"
                                    data-meaning="${token.meaning}"
                                    data-romaji="${token.romaji}">
                                    ${token.morpheme}
                                </span>
                            `;
                                }
                            });

                            html += `<p>${i + 1}. ${optionHTML}</p>`;
                        });

                        html += `
                        <div class="mcq-answer">
                            Correct Answer: ${questionObj.answer + 1}
                        </div>
                    </div>
                `;
                    });
                }
            });

            html += `<span class="back-footer">Back to list</span>`;

            comprehension.innerHTML = html;
            comprehension.style.display = 'block';
        });

        /* ============================= */
        /* INTERACTIONS */
        /* ============================= */

        comprehension.addEventListener('click', function (e) {

            if (e.target.classList.contains('back-footer')) {
                comprehension.style.display = 'none';
                comprehension.innerHTML = '';
                list.style.display = 'block';
                popup.style.display = 'none';
                activeWord = null;
                return;
            }

            if (e.target.classList.contains('difficult')) {
                e.stopPropagation();

                if (activeWord === e.target) return;
                activeWord = e.target;

                popup.innerHTML = `
            <div class="romaji">${e.target.dataset.romaji}</div>
            <div class="meaning">${e.target.dataset.meaning}</div>
        `;

                popup.style.display = 'block';
                const rect = e.target.getBoundingClientRect();
                popup.style.top = rect.bottom + window.scrollY + 8 + "px";
                popup.style.left = rect.left + window.scrollX + "px";
            }

            if (e.target.classList.contains('toggle-arrow')) {
                const sentence = e.target.closest('.sentence');
                const div = sentence.querySelector('.translation');

                if (div.style.display === 'block') {
                    div.style.display = 'none';
                    e.target.textContent = '▼';
                } else {
                    div.textContent = sentence.dataset.meaning;
                    div.style.display = 'block';
                    e.target.textContent = '▲';
                }
            }

            if (e.target.classList.contains('toggle-mcq-arrow')) {
                const sentence = e.target.closest('.sentence');
                const div = sentence.querySelector('.mcq-answer');

                if (div.style.display === 'block') {
                    div.style.display = 'none';
                    e.target.textContent = '▼';
                } else {
                    div.style.display = 'block';
                    e.target.textContent = '▲';
                }
            }
        });

        document.body.addEventListener('click', () => {
            popup.style.display = 'none';
            activeWord = null;
        });
    </script>

</body>

</html>
