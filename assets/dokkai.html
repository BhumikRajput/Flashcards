<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensions</title>

    <style>
        * {
            font-size: 30px;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: white;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        .section-heading {
            font-size: 40px;
            margin-top: 25px;
            margin-bottom: 10px;
            color: #222;
        }

        .section-divider {
            border: none;
            border-top: 2px solid #ccc;
            margin: 20px 0;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background-color: #fff;
            margin: 8px 0;
            padding: 12px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        li:hover {
            background-color: #e0e0e0;
        }

        #comprehension {
            display: none;
            margin-top: 20px;
        }

        .sentence {
            margin-bottom: 12px;
        }

        p {
            margin: 6px 0;
        }

        .toggle-arrow,
        .toggle-answer {
            cursor: pointer;
            color: #3399ff;
        }

        .toggle-arrow:active,
        .toggle-answer:active {
            color: #ff9933;
        }

        .difficult {
            cursor: pointer;
            background-color: #e9e9e9;
            border-right: 5px solid white;
        }

        #comprehension.popup-active .difficult:hover {
            background-color: #e9e9e9;
        }

        .difficult:hover {
            background-color: #A4E1F6;
        }

        .popup {
            display: none;
            position: absolute;
            background: #fcedff;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 6px;
            max-width: 250px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .romaji {
            color: gray;
        }

        .meaning {
            color: green;
        }

        .translation {
            display: none;
            padding: 6px;
            background: #3399ff;
            border-radius: 4px;
            margin-top: 6px;
            color: white;
        }

        .mcq-answer {
            display: none;
            padding: 6px;
            background: #d4edda;
            border-radius: 5px;
            margin-top: 6px;
        }

        .back-footer {
            display: block;
            margin-top: 25px;
            text-align: center;
            cursor: pointer;
            color: #3399ff;
            text-decoration: underline;
        }

        ruby rt {
            font-size: 0.7em;
            color: gray;
        }
    </style>
</head>

<body>

    <h1>Comprehensions</h1>

    <ul id="comprehension-list"></ul>
    <div id="comprehension"></div>
    <div id="popup" class="popup"></div>

    <script>
        const list = document.getElementById('comprehension-list');
        const comprehension = document.getElementById('comprehension');
        const popup = document.getElementById('popup');

        let comprehensionData = {};
        let activeWord = null;

        let comprehensionList = [
            { name: "d1", text: "Dokkai 1" },
            { name: "test_dokkai", text: "Test" }
        ];

        comprehensionList.forEach(item => {
            list.innerHTML += `<li data-name="${item.name}">${item.text}</li>`;
        });

        async function loadJSON(item) {
            const name = item.getAttribute('data-name');
            const url = `https://raw.githubusercontent.com/BhumikRajput/Flashcards/main/assets/comprehensions/${name}.json`;

            if (!comprehensionData[name]) {
                const response = await fetch(url);
                if (!response.ok) return null;
                comprehensionData[name] = await response.json();
            }
            return comprehensionData[name];
        }

        // 🔥 Render Token Function
        function renderToken(token) {
            let text = token.morpheme;

            // Apply formatting
            if (token.format && Array.isArray(token.format)) {
                token.format.forEach(f => {
                    if (f === 'b') text = `<b>${text}</b>`;
                    if (f === 'i') text = `<i>${text}</i>`;
                    if (f === 'u') text = `<u>${text}</u>`;
                    if (f === 's') text = `<s>${text}</s>`;
                });
            }

            // Apply furigana
            if (token.furigana) {
                text = `<ruby>${text}<rt>${token.furigana}</rt></ruby>`;
            }

            // Wrap difficult word
            if (token.meaning !== null && token.meaning !== undefined) {
                text = `<span class="difficult"
                    data-meaning="${token.meaning}"
                    data-romaji="${token.romaji || ''}">
                    ${text}
                </span>`;
            }

            return text;
        }

        // Load comprehension
        list.addEventListener('click', async (e) => {
            const item = e.target.closest('li');
            if (!item) return;

            let data = await loadJSON(item);
            if (!data) return;

            comprehension.innerHTML = "";
            list.style.display = 'none';

            let html = "";

            data.forEach(section => {

                if (section.type === "paragraph") {
                    html += `<div class="section-heading">📖 Reading Passage</div>`;

                    section.data.forEach(sentenceDict => {
                        let sentenceObj = '';
                        sentenceDict.sentence.forEach(token => {
                            sentenceObj += renderToken(token);
                        });

                        html += `<div class="sentence" data-meaning="${sentenceDict.translation || ''}">
                    <p>${sentenceObj} <span class="toggle-arrow">▼</span></p>
                    <div class="translation"></div>
                </div>`;
                    });

                    html += `<hr class="section-divider">`;
                }

                if (section.type === "mcq") {
                    html += `<div class="section-heading">📝 Questions</div>`;

                    section.data.forEach((questionObj, index) => {

                        let questionHTML = '';
                        questionObj.question.forEach(token => {
                            questionHTML += renderToken(token);
                        });

                        html += `<div class="sentence" data-meaning="${questionObj.translationQues || ''}">
                    <p><strong>Q${index + 1}:</strong> ${questionHTML} <span class="toggle-arrow">▼</span></p>
                    <div class="translation"></div>`;

                        questionObj.options.forEach((option, i) => {
                            let optionHTML = '';
                            option.forEach(token => {
                                optionHTML += renderToken(token);
                            });
                            html += `<p>${i + 1}. ${optionHTML}</p>`;
                        });

                        html += `<p><span class="toggle-answer">Show Answer</span></p>
                         <div class="mcq-answer">Correct Answer: ${questionObj.answer + 1}</div>
                         </div>`;
                    });
                }

            });

            html += `<span class="back-footer">Back to list</span>`;

            comprehension.innerHTML = html;
            comprehension.style.display = 'block';
        });

        // 🔥 Main Click Handler
        comprehension.addEventListener('click', function (e) {

            const target = e.target;

            // 🔥 NEW LOGIC: If popup is open, close it and STOP everything else
            if (popup.style.display === 'block') {
                popup.style.display = 'none';
                activeWord = null;
                comprehension.classList.remove('popup-active');

                e.stopPropagation();
                e.preventDefault();
                return; // 🚀 Prevents ANY other action
            }

            // 🔥 Normal behavior below (only runs if popup is NOT open)

            const difficultWord = target.closest('.difficult');
            if (difficultWord) {
                activeWord = difficultWord;

                popup.innerHTML = `
            <div class="romaji">${difficultWord.dataset.romaji}</div>
            <div class="meaning">${difficultWord.dataset.meaning.split(',').join('; ')}</div>
        `;

                popup.style.display = 'block';
                comprehension.classList.add('popup-active');

                const rect = difficultWord.getBoundingClientRect();
                popup.style.top = rect.bottom + window.scrollY + 8 + "px";
                popup.style.left = rect.left + window.scrollX + "px";

                return;
            }

            // Toggle translation
            if (target.classList.contains('toggle-arrow')) {
                const sentence = target.closest('.sentence');
                const div = sentence.querySelector('.translation');

                if (div.style.display === 'block') {
                    div.style.display = 'none';
                    target.textContent = '▼';
                } else {
                    div.textContent = sentence.dataset.meaning;
                    div.style.display = 'block';
                    target.textContent = '▲';
                }
                return;
            }

            // Toggle MCQ answer
            if (target.classList.contains('toggle-answer')) {
                const sentence = target.closest('.sentence');
                const div = sentence.querySelector('.mcq-answer');

                if (div.style.display === 'block') {
                    div.style.display = 'none';
                    target.textContent = 'Show Answer';
                } else {
                    div.style.display = 'block';
                    target.textContent = 'Hide Answer';
                }
                return;
            }

            // Back button
            if (target.classList.contains('back-footer')) {
                comprehension.style.display = 'none';
                comprehension.innerHTML = '';
                list.style.display = 'block';
                popup.style.display = 'none';
                return;
            }
        });
    </script>
</body>

</html>
